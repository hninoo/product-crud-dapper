# The SA password is never stored in this file or in the repository.
# Supply it from your shell environment before running docker compose:
#   Linux/macOS:        export MSSQL_SA_PASSWORD='YourStrongPassword1!'
#   Windows PowerShell: $env:MSSQL_SA_PASSWORD = 'YourStrongPassword1!'
#   Windows cmd:        set MSSQL_SA_PASSWORD=YourStrongPassword1!
services:
  sqlserver:
    build:
      context: .
      dockerfile: database/sqlserver-fts.Dockerfile
    image: sqlserver-fts:2022
    platform: linux/amd64
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?export MSSQL_SA_PASSWORD before running docker compose}
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        # Healthy only when every database is fully online (state 0),
        # otherwise db-init can race SQL Server's startup recovery.
        # $$ defers expansion to the container shell, which has the env var.
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -b -Q "IF EXISTS (SELECT 1 FROM sys.databases WHERE state <> 0) RAISERROR(N'recovering', 16, 1)" -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # One-shot job: creates ProductCrudDb, the Products table, and seed data.
  # The script is idempotent, so re-running compose up is safe.
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?export MSSQL_SA_PASSWORD before running docker compose}
    volumes:
      - ./database:/database:ro
    entrypoint:
      - /bin/bash
      - -c
      # Retry because SQL Server can pass its healthcheck a moment before
      # user databases finish startup recovery (error 904).
      - |
        for i in $$(seq 1 12); do
          if /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C -b -i /database/01-create-database.sql; then
            exit 0
          fi
          echo "db-init attempt $$i failed; retrying in 5s..."
          sleep 5
        done
        exit 1

  web:
    build:
      context: .
      dockerfile: src/ProductCrud.Web/Dockerfile
    container_name: productcrud-web
    ports:
      - "8080:8080"
    environment:
      # Standard ASP.NET Core configuration key: the double underscore maps
      # to ConnectionStrings:DefaultConnection and overrides appsettings.json.
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ProductCrudDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

volumes:
  sqlvolume:
    external: true
